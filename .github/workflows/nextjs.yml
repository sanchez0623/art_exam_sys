name: Build art-history app

on:
  push:
    branches: ["main"]
    paths:
      - 'art-history/**'
      - '.github/workflows/nextjs.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: art-history

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: art-history/package-lock.json

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            art-history/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('art-history/package-lock.json') }}-${{ hashFiles('art-history/**/*.[jt]s', 'art-history/**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('art-history/package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      - name: Build with Next.js
        run: npm run build
